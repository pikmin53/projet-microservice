services:

  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${PORT_API}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_AUTH_URL
    depends_on:
      service_auth:
        condition: service_started
    restart: on-failure
    networks:
      - internal
      - externe

  service_auth:
    container_name: service_auth
    ports:
    - "${PORT_AUTH}:8000"
    build:
      context: ./service_authentification
      dockerfile: Dockerfile
    environment:
      - DATABASE_USER_URL
      - SECRET_KEY
      - ALGORITHM
      - TOKEN_EXPIRE_MINUTES
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      user_db:
        condition: service_started
    restart: on-failure
    networks:
      - internal
      - externe

          
  user_db:
    image: postgres
    container_name: user_db
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_DB: user_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
    networks:
      - internal

  api_db:
    image: postgres
    container_name: api_db
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_DB: api_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
    networks:
      - internal


  service_tensorflow:
    container_name: service_tensorflow
    build:
      context: ./services_training/tensorflow_model
      dockerfile: Dockerfile
    environment:
      - DATABASE_API_URL
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      api_db:
        condition: service_started
      kafka:
        condition: service_started
    restart: on-failure
    volumes:
      - ./services_training/tensorflow_model:/app
    networks:
      - internal


  service_pytorch:
    container_name: service_pytorch
    build:
      context: ./services_training/pytorch_model
      dockerfile: Dockerfile
    environment:
      - DATABASE_API_URL
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      api_db:
        condition: service_started
      kafka:
        condition: service_started
    restart: on-failure
    volumes:
      - ./services_training/pytorch_model:/app
      - pytorch_data:/app/data 
    networks:
      - internal
        
  bdd_service:
    container_name: bdd_service
    build:
      context: ./bdd_service
      dockerfile: Dockerfile
    
    environment:
      - DATABASE_API_URL
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      api_db:
        condition: service_started
      kafka:
        condition: service_started
      service_tensorflow:
        condition: service_started
      service_pytorch:
        condition: service_started
    restart: on-failure  
    networks:
      - internal

  adminer:
    image: adminer
    restart: always
    ports:
      - "${PORT_ADMINER}:8080"
    networks:
      - internal
      - externe


  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL}
        VITE_API_AUTH_URL: ${VITE_API_AUTH_URL}
    container_name: frontend
    ports:
      - "${PORT_FRONT}:80"
    restart: unless-stopped
    networks:
      - externe

  kafka:
    image : confluentinc/cp-kafka:7.8.3
    container_name: kafka
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "Qi0fGmQDTMuu9eKmM3ixnA"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    volumes:
      - kafka_kafka:/var/lib/kafka/data
    networks:
      - internal

networks:
  externe:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  kafka_kafka:
  pytorch_data:


